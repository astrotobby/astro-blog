<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="humanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2410c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="600" y="50" font-size="48" font-weight="bold" text-anchor="middle" fill="#f1f5f9">
    AI vs Human Intelligence
  </text>
  <text x="600" y="95" font-size="24" text-anchor="middle" fill="#cbd5e1">
    The Evolution in 2026
  </text>
  
  <!-- Left side - AI -->
  <g>
    <!-- AI Brain/Circuit -->
    <circle cx="300" cy="280" r="100" fill="url(#aiGrad)" opacity="0.8"/>
    <circle cx="300" cy="280" r="100" fill="none" stroke="#60a5fa" stroke-width="3"/>
    
    <!-- Circuit lines -->
    <line x1="250" y1="280" x2="350" y2="280" stroke="#60a5fa" stroke-width="2"/>
    <line x1="300" y1="230" x2="300" y2="330" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="250" cy="280" r="6" fill="#60a5fa"/>
    <circle cx="350" cy="280" r="6" fill="#60a5fa"/>
    <circle cx="300" cy="230" r="6" fill="#60a5fa"/>
    <circle cx="300" cy="330" r="6" fill="#60a5fa"/>
    
    <!-- Label -->
    <text x="300" y="285" font-size="28" font-weight="bold" text-anchor="middle" fill="white">AI</text>
    
    <!-- Traits -->
    <text x="300" y="420" font-size="18" font-weight="bold" text-anchor="middle" fill="#f1f5f9">
      Artificial Intelligence
    </text>
    <text x="300" y="450" font-size="14" text-anchor="middle" fill="#cbd5e1">
      • Logic-based
    </text>
    <text x="300" y="475" font-size="14" text-anchor="middle" fill="#cbd5e1">
      • Scalable &amp; Fast
    </text>
    <text x="300" y="500" font-size="14" text-anchor="middle" fill="#cbd5e1">
      • Pattern Recognition
    </text>
    <text x="300" y="525" font-size="14" text-anchor="middle" fill="#cbd5e1">
      • Data Processing
    </text>
    <text x="300" y="550" font-size="14" text-anchor="middle" fill="#cbd5e1">
      • No consciousness
    </text>
  </g>
  
  <!-- Right side - Human -->
  <g>
    <!-- Human Head -->
    <circle cx="900" cy="230" r="60" fill="url(#humanGrad)" opacity="0.8"/>
    <circle cx="900" cy="230" r="60" fill="none" stroke="#fb923c" stroke-width="3"/>
    
    <!-- Brain wave -->
    <path d="M 880 260 Q 890 250 900 260 T 920 260" stroke="#fb923c" stroke-width="2" fill="none"/>
    
    <!-- Eyes -->
    <circle cx="890" cy="220" r="5" fill="#fef3c7"/>
    <circle cx="910" cy="220" r="5" fill="#fef3c7"/>
    
    <!-- Label -->
    <text x="900" y="300" font-size="28" font-weight="bold" text-anchor="middle" fill="white">HUMAN</text>
    
    <!-- Traits -->
    <text x="900" y="420" font-size="18" font-weight="bold" text-anchor="middle" fill="#f1f5f9">
      Human Intelligence
    </text>
    <text x="900" y="450" font-size="14" text-anchor="middle" fill="#cbd5e1">
      • Emotional &amp; Creative
    </text>
    <text x="900" y="475" font-size="14" text-anchor="middle" fill="#cbd5e1">
      • Intuition &amp; Wisdom
    </text>
    <text x="900" y="500" font-size="14" text-anchor="middle" fill="#cbd5e1">
      • Flexible Thinking
    </text>
    <text x="900" y="525" font-size="14" text-anchor="middle" fill="#cbd5e1">
      • Self-awareness
    </text>
    <text x="900" y="550" font-size="14" text-anchor="middle" fill="#cbd5e1">
      • Purpose-driven
    </text>
  </g>
  
  <!-- Center - Convergence line -->
  <line x1="400" y1="280" x2="800" y2="280" stroke="#a78bfa" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="600" y="260" font-size="14" text-anchor="middle" fill="#a78bfa" font-style="italic">
    Growing Convergence
  </text>
  
  <!-- Bottom message -->
  <rect x="150" y="600" width="900" height="60" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="8"/>
  <text x="600" y="635" font-size="16" text-anchor="middle" fill="#f1f5f9">
    The Future: Collaborative Intelligence - AI + Human Creativity = Unprecedented Progress
  </text>
</svg>